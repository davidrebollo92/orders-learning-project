services:
  postgres-service-a:
    image: postgres
    container_name: amazon-postgres-service-a
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: service_a_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_service_a_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-service-b:
    image: postgres
    container_name: amazon-postgres-service-b
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: service_b_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_service_b_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: amazon-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://kafka:9093,PLAINTEXT://kafka:19092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: amazon-schema-registry
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:19092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_started

  service_a:
    build:
      context: .
      dockerfile: service_a/Dockerfile
    container_name: amazon-service-a
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://amazon-postgres-service-a:5432/service_a_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      postgres-service-a:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    restart: on-failure

  service_b:
    build:
      context: .
      dockerfile: service_b/Dockerfile
    container_name: amazon-service-b
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://amazon-postgres-service-b:5432/service_b_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      postgres-service-b:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    restart: on-failure

volumes:
  postgres_service_a_data:
  postgres_service_b_data:
