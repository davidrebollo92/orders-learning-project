<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AsyncAPI — Service A: Order Management</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@asyncapi/react-component@latest/styles/default.min.css"
    />
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="asyncapi"></div>
    <script src="https://unpkg.com/@asyncapi/react-component@latest/browser/standalone/index.js"></script>
    <script>
      AsyncApiStandalone.render(
        {
          schema: { url: '/asyncapi/asyncapi.yaml' },
          config: {
            show: { sidebar: true },
            sidebar: { showServers: 'byDefault', showOperations: 'byDefault' },
          },
        },
        document.getElementById('asyncapi')
      );
    </script>
  </body>
</html>
