asyncapi: 3.0.0

info:
  title: Order Service — Order Management
  version: 1.0.0
  description: >
    Manages the order lifecycle. Publishes an OrderCreatedEvent when a new
    order is placed and reacts to payment outcomes to mark orders as PAID or
    CANCELLED.

defaultContentType: application/octet-stream

channels:
  ordersCreated:
    address: amazon.env.order-management.orders.created.pub
    description: Orders published after a successful POST /orders.
    messages:
      OrderCreatedEvent:
        $ref: '#/components/messages/OrderCreatedEvent'
    bindings:
      kafka:
        topic: amazon.env.order-management.orders.created.pub

  paymentsCompleted:
    address: amazon.env.order-management.payments.completed.pub
    description: Successful payment events produced by payment-service.
    messages:
      PaymentCompletedEvent:
        $ref: '#/components/messages/PaymentCompletedEvent'
    bindings:
      kafka:
        topic: amazon.env.order-management.payments.completed.pub

  paymentsFailed:
    address: amazon.env.order-management.payments.failed.pub
    description: Failed payment events produced by payment-service.
    messages:
      PaymentFailedEvent:
        $ref: '#/components/messages/PaymentFailedEvent'
    bindings:
      kafka:
        topic: amazon.env.order-management.payments.failed.pub

operations:
  publishOrderCreated:
    action: send
    channel:
      $ref: '#/channels/ordersCreated'
    summary: Publish an event when a new order is created.
    description: >
      Sent via the Transactional Outbox Pattern: the event is persisted in
      outbox_events within the same transaction as the order, then forwarded
      to Kafka by OutboxScheduler every second.
    messages:
      - $ref: '#/channels/ordersCreated/messages/OrderCreatedEvent'

  consumePaymentCompleted:
    action: receive
    channel:
      $ref: '#/channels/paymentsCompleted'
    summary: Mark the order as PAID when payment succeeds.
    description: >
      Processed by PaymentCompleter. Retried up to 3 times with exponential
      backoff (1 s × 2). Unrecoverable failures are routed to the DLT and
      persisted in dead_letter_events.
    bindings:
      kafka:
        groupId:
          type: string
          enum: [order-payment-updater]
    messages:
      - $ref: '#/channels/paymentsCompleted/messages/PaymentCompletedEvent'

  consumePaymentFailed:
    action: receive
    channel:
      $ref: '#/channels/paymentsFailed'
    summary: Cancel the order when payment fails.
    description: >
      Processed by OrderCanceller. Same retry and DLT policy as
      consumePaymentCompleted.
    bindings:
      kafka:
        groupId:
          type: string
          enum: [order-payment-updater]
    messages:
      - $ref: '#/channels/paymentsFailed/messages/PaymentFailedEvent'

components:
  messages:
    OrderCreatedEvent:
      name: OrderCreatedEvent
      title: Order Created Event
      summary: Published when a new order is placed.
      contentType: application/json
      payload:
        type: object
        required: [orderId, productId, quantity, amount]
        properties:
          orderId:
            type: string
            format: uuid
          productId:
            type: string
            format: uuid
          quantity:
            type: integer
          amount:
            type: string
            description: "Decimal amount as string (e.g. '99.99'). Avro type: string."

    PaymentCompletedEvent:
      name: PaymentCompletedEvent
      title: Payment Completed Event
      summary: Published by payment-service when a payment is approved.
      contentType: application/json
      payload:
        type: object
        required: [paymentId, orderId]
        properties:
          paymentId:
            type: string
            format: uuid
          orderId:
            type: string
            format: uuid

    PaymentFailedEvent:
      name: PaymentFailedEvent
      title: Payment Failed Event
      summary: Published by payment-service when a payment is rejected (e.g. insufficient funds).
      contentType: application/json
      payload:
        type: object
        required: [paymentId, orderId]
        properties:
          paymentId:
            type: string
            format: uuid
          orderId:
            type: string
            format: uuid
